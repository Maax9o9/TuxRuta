<div *ngIf="isBrowser">
  <h3>Promedio por Viaje</h3>
  <div class="chart-container">
    <canvas baseChart
            [data]="chartData"
            [options]="chartOptions"
            [type]="chartType">
    </canvas>
  </div>
  <div *ngIf="isDataLoaded" class="summary">
    <div class="summary-info">
      <div class="info-item">
        <span class="label">Promedio general:</span>
        <span class="value">{{ getAveragePromedy() }}</span>
      </div>
      <div class="info-item">
        <span class="label">Máximo:</span>
        <span class="value">{{ getHighestPromedy() }}</span>
      </div>
      <div class="info-item">
        <span class="label">Mínimo:</span>
        <span class="value">{{ getLowestPromedy() }}</span>
      </div>
    </div>
    <div class="legend-custom">
      <div class="legend-item">
        <span class="indicator solid dark"></span>
      </div>
    </div>
  </div>
</div>
<div *ngIf="!isBrowser">
  <p>Gráfico no disponible en servidor</p>
</div>
