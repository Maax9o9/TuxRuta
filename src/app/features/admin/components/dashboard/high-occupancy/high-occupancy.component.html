<h2 class="chart-title">Probabilidad de Ocupación Alta</h2>
<div class="chart-container">
  <canvas baseChart
    [data]="barChartData"
    [options]="barChartOptions"
    [type]="barChartType">
  </canvas>
</div>
<div class="probability-label">
  <span>{{ (probability * 100) | number:'1.0-2' }}%</span>
</div>
