<div *ngIf="isBrowser">
  <h3>Límites de Confianza - Velocidad</h3>
  <div class="chart-container">
    <canvas baseChart
            [data]="chartData"
            [options]="chartOptions"
            [type]="chartType">
    </canvas>
  </div>
  <div *ngIf="isDataLoaded" class="summary">
    <div class="summary-info">
      <div class="info-item">
        <span class="label">Total de días:</span>
        <span class="value">{{ dailyResumeData.length }}</span>
      </div>
      <div class="info-item">
        <span class="label">Velocidad promedio:</span>
        <span class="value">{{ getAverageSpeed() }} km/h</span>
      </div>
    </div>
    <div class="legend-custom">
      <div class="legend-item">
        <span class="indicator dashed red"></span>
        <span class="text">Límite Superior</span>
      </div>
      <div class="legend-item">
        <span class="indicator dashed green"></span>
        <span class="text">Límite Inferior</span>
      </div>
    </div>
  </div>
</div>
<div *ngIf="!isBrowser">
  <p>Gráfico no disponible en servidor</p>
</div>
