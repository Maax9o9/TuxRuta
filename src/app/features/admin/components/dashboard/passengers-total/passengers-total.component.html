<div *ngIf="isBrowser">
  <h3>Total de Pasajeros</h3>
  <div class="chart-container">
    <canvas baseChart
            [data]="chartData"
            [options]="chartOptions"
            [type]="chartType">
    </canvas>
  </div>
  <div *ngIf="isDataLoaded" class="summary">
    <div class="summary-info">
      <div class="info-item">
        <span class="label">Total de días:</span>
        <span class="value">{{ dailyResumeData.length }}</span>
      </div>
      <div class="info-item">
        <span class="label">Total pasajeros:</span>
        <span class="value">{{ getTotalPassengers() }}</span>
      </div>
      <div class="info-item">
        <span class="label">Promedio diario:</span>
        <span class="value">{{ getAveragePassengers() }}</span>
      </div>
    </div>
  </div>
</div>
<div *ngIf="!isBrowser">
  <p>Gráfico no disponible en servidor</p>
</div>
