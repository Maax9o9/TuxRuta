<div *ngIf="isBrowser">
  <h3>Horas Pico</h3>
  <div class="chart-container">
    <canvas baseChart
            [data]="chartData"
            [options]="chartOptions"
            [type]="chartType">
    </canvas>
  </div>
  <div *ngIf="isDataLoaded" class="summary">
    <div class="summary-info">
      <div class="info-item">
        <span class="label">Total de días:</span>
        <span class="value">{{ dailyResumeData.length }}</span>
      </div>
      <div class="info-item">
        <span class="label">Hora más común:</span>
        <span class="value">{{ getMostCommonRushHour() }}</span>
      </div>
      <div class="info-item">
        <span class="label">Promedio pasajeros:</span>
        <span class="value">{{ getAveragePassengersAtRushHour() }}</span>
      </div>
    </div>
    <div class="legend-custom">
      <div class="legend-item">
        <span class="indicator solid cream"></span>
        <span class="text">Tendencia Horas Pico</span>
      </div>
    </div>
  </div>
</div>
<div *ngIf="!isBrowser">
  <p>Gráfico no disponible en servidor</p>
</div>
