<table class="stop-table">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Ruta</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of stops; let i = index">
      <td>{{ item.nombre }}</td>
      <td>{{ item.ruta_id || '-' }}</td>
      <td>
        <img
          src="delete.png"
          alt="Eliminar"
          class="delete-icon"
          (click)="$event.stopPropagation(); onDeleteClick(i)"
        />
      </td>
    </tr>
  </tbody>
</table>

<app-confirm-delete-alert *ngIf="showConfirmDelete"
  (cancel)="onCancelDelete()"
  (delete)="onConfirmDelete()">
</app-confirm-delete-alert>
<div *ngIf="showDeleteAlert" class="delete-alert-backdrop open">
  <div class="delete-modal-container">
    <app-delete-alert (close)="onCloseDeleteAlert()"></app-delete-alert>
  </div>
</div>
