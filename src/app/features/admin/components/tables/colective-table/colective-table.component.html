<app-delete-alert *ngIf="showDeleteAlert" (close)="onCloseDeleteAlert()"></app-delete-alert>
<table class="colective-table">
  <thead>
    <tr>
      <th>Colectivo</th>
      <th>Ruta</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <!-- Visual log removed -->
    <tr *ngFor="let item of colectivos; let i = index">
      <td>{{ item.matricula }}</td>
      <td>{{ item.ruta_id }}</td>
      <td>
        <img
          src="delete.png"
          alt="Eliminar"
          class="delete-icon"
          (click)="onDeleteClick(i)"
        />
      </td>
    </tr>
  </tbody>
</table>
<app-confirm-delete-alert *ngIf="showConfirmDelete"
  (cancel)="onCancelDelete()"
  (delete)="onConfirmDelete()">
</app-confirm-delete-alert>
