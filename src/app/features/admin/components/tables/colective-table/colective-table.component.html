<table class="colective-table">
  <thead>
    <tr>
      <th>Colectivo</th>
      <th>Ruta</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of colectivos; let i = index">
      <td>{{ item.nombre }}</td>
      <td>{{ item.ruta }}</td>
      <td>
        <img
          src="delete.png"
          alt="Eliminar"
          class="delete-icon"
          (click)="eliminar(i)"
        />
      </td>
    </tr>
  </tbody>
</table>
