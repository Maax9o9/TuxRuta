<div *ngIf="location; else loading">
  <p><strong>ID:</strong> {{ location.id }}</p>
  <p><strong>Colectivo ID:</strong> {{ location.colectivo_id }}</p>
  <p><strong>Latitud:</strong> {{ location.latitud }}</p>
  <p><strong>Longitud:</strong> {{ location.longitud }}</p>
  <p><strong>Velocidad:</strong> {{ location.velocidad }} km/h</p>
  <p><strong>Fecha/Hora:</strong> {{ location.fecha_hora | date:'short' }}</p>
</div>

<ng-template #loading>
  <p>Esperando datos del GPS...</p>
</ng-template>
