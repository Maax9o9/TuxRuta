<ng-container *ngIf="colective$ | async as colective; else loading">
  <p><strong>ID:</strong> {{ colective.id }}</p>
  <p><strong>Matrícula:</strong> {{ colective.matricula }}</p>
  <p><strong>Ruta ID:</strong> {{ colective.ruta_id }}</p>
  <p><strong>Activo:</strong> {{ colective.activo ? 'Sí' : 'No' }}</p>
  <p><strong>Creado por:</strong> {{ colective.creado_por }}</p>
  <p><strong>Creado en:</strong> {{ colective.creado_en | date:'short' }}</p>
</ng-container>

<ng-template #loading>
  <p>Esperando datos del colectivo...</p>
</ng-template>
