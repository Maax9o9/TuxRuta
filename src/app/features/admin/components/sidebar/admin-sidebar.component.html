<div class="admin-sidebar">
  <div class="sidebar-header">
    <img src="/Logo_TuxRuta.png" alt="TuxRuta Logo" class="sidebar-logo">
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item">
        <button 
          class="nav-button"
          [class.active]="isActiveRoute('/admin/dashboard')"
          (click)="navigateTo('/admin/dashboard')">
          <img *ngIf="iconPaths.dashboard" [src]="iconPaths.dashboard" [ngStyle]="getIconStyle()" alt="icono dashboard" />
          <span class="nav-text">Dashboard</span>
        </button>
      </li>

      <li class="nav-item">
        <button 
          class="nav-button"
          [class.active]="isActiveRoute('/admin/metricas')"
          (click)="toggleMetricas()">
          <img *ngIf="iconPaths.metricas" [src]="iconPaths.metricas" [ngStyle]="getIconStyle()" alt="icono métricas" />
          <span class="nav-text">Métricas</span>
          <i class="nav-arrow" [class.expanded]="isMetricasExpanded">▼</i>
        </button>
        
        <!-- Submenu for Métricas -->
        <ul class="submenu" [class.expanded]="isMetricasExpanded">
          <li class="submenu-item">
            <button 
              class="submenu-button"
              [class.active]="isActiveRoute('/admin/metrics/high-occupancy')"
              (click)="onSubmenuItemClick('Alta Ocupación')">
              <span class="submenu-text">Alta Ocupación</span>
            </button>
          </li>
          <li class="submenu-item">
            <button 
              class="submenu-button"
              [class.active]="isActiveRoute('/admin/metrics/normal-distribution')"
              (click)="onSubmenuItemClick('Distribución Normal')">
              <span class="submenu-text">Distribución Normal</span>
            </button>
          </li>
          <li class="submenu-item">
            <button 
              class="submenu-button"
              [class.active]="isActiveRoute('/admin/metrics/confidence-interval')"
              (click)="onSubmenuItemClick('Intervalo de Confianza')">
              <span class="submenu-text">Intervalo de Confianza</span>
            </button>
          </li>
          <li class="submenu-item">
            <button 
              class="submenu-button"
              [class.active]="isActiveRoute('/admin/metrics/passengers-total')"
              (click)="onSubmenuItemClick('Total de Pasajeros')">
              <span class="submenu-text">Total de Pasajeros</span>
            </button>
          </li>
          <li class="submenu-item">
            <button 
              class="submenu-button"
              [class.active]="isActiveRoute('/admin/metrics/rush-hour')"
              (click)="onSubmenuItemClick('Horas Pico')">
              <span class="submenu-text">Horas Pico</span>
            </button>
          </li>
          <li class="submenu-item">
            <button 
              class="submenu-button"
              [class.active]="isActiveRoute('/admin/metrics/travel-average')"
              (click)="onSubmenuItemClick('Promedio de Viaje')">
              <span class="submenu-text">Promedio de Viaje</span>
            </button>
          </li>
        </ul>
      </li>


      <!-- Submenú Colectivos -->
      <li class="nav-item">
        <button 
          class="nav-button"
          (click)="toggleColectivos()">
          <img *ngIf="iconPaths.colectivos" [src]="iconPaths.colectivos" [ngStyle]="getIconStyle()" alt="icono colectivos" />
          <span class="nav-text">Colectivos</span>
          <i class="nav-arrow" [class.expanded]="isColectivosExpanded">▼</i>
        </button>
        <ul class="submenu" [class.expanded]="isColectivosExpanded">
          <li class="submenu-item">
            <button class="submenu-button" (click)="navigateTo('/admin/add-colectives')">
              <span class="submenu-text">Crear Colectivo</span>
            </button>
          </li>
          <li class="submenu-item">
            <button class="submenu-button" (click)="navigateTo('/admin/colective-table')">
              <span class="submenu-text">Tabla de Colectivos</span>
            </button>
          </li>
        </ul>
      </li>
      <!-- Submenú Rutas -->
      <li class="nav-item">
        <button 
          class="nav-button"
          (click)="toggleRutas()">
          <img *ngIf="iconPaths.rutas" [src]="iconPaths.rutas" [ngStyle]="getIconStyle()" alt="icono rutas" />
          <span class="nav-text">Rutas</span>
          <i class="nav-arrow" [class.expanded]="isRutasExpanded">▼</i>
        </button>
        <ul class="submenu" [class.expanded]="isRutasExpanded">
          <li class="submenu-item">
            <button class="submenu-button" (click)="navigateTo('/admin/add-routes')">
              <span class="submenu-text">Crear Ruta</span>
            </button>
          </li>
          <li class="submenu-item">
            <button class="submenu-button" (click)="navigateTo('/admin/routes-table')">
              <span class="submenu-text">Tabla de Rutas</span>
            </button>
          </li>
        </ul>
      </li>
      <!-- Submenú Paradas -->
      <li class="nav-item">
        <button 
          class="nav-button"
          (click)="toggleParadas()">
          <img *ngIf="iconPaths.paradas" [src]="iconPaths.paradas" [ngStyle]="getIconStyle()" alt="icono paradas" />
          <span class="nav-text">Paradas</span>
          <i class="nav-arrow" [class.expanded]="isParadasExpanded">▼</i>
        </button>
        <ul class="submenu" [class.expanded]="isParadasExpanded">
          <li class="submenu-item">
            <button class="submenu-button" (click)="navigateTo('/admin/stop-table')">
              <span class="submenu-text">Tabla de Paradas</span>
            </button>
          </li>
        </ul>
      </li>
    </ul>
  </nav>

<div class="sidebar-footer">
  <button class="logout-button" (click)="logout()">
    <img *ngIf="iconPaths.logout" [src]="iconPaths.logout" [ngStyle]="getIconStyle()" alt="icono logout" />
    <fa-icon [icon]="faRightFromBracket"></fa-icon>
  </button>
</div>
