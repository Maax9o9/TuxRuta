<div class="filters-section">
  <h2>{{ title }}</h2>
  <div class="filters-container">

    <!-- Año -->
    <div class="filter-group">
      <label for="yearSelect">Año:</label>
      <div class="custom-dropdown">
        <button class="dropdown-button" (click)="toggleDropdown('year')">
          <span>{{ selectedYear }}</span>
          <i class="dropdown-arrow" [class.expanded]="isDropdownOpen('year')">▼</i>
        </button>
        <ul class="dropdown-menu" [class.expanded]="isDropdownOpen('year')">
          <li class="dropdown-item" *ngFor="let year of availableYears">
            <button class="dropdown-option"
                    [class.active]="selectedYear === year"
                    (click)="selectYear(year)">
              {{ year }}
            </button>
          </li>
        </ul>
      </div>
    </div>

    <!-- Mes -->
    <div class="filter-group">
      <label for="monthSelect">Mes:</label>
      <div class="custom-dropdown">
        <button class="dropdown-button" (click)="toggleDropdown('month')">
          <span>{{ getSelectedMonthName() }}</span>
          <i class="dropdown-arrow" [class.expanded]="isDropdownOpen('month')">▼</i>
        </button>
        <ul class="dropdown-menu" [class.expanded]="isDropdownOpen('month')">
          <li class="dropdown-item" *ngFor="let month of availableMonths">
            <button class="dropdown-option"
                    [class.active]="selectedMonth === month.value"
                    (click)="selectMonth(month.value)">
              {{ month.name }}
            </button>
          </li>
        </ul>
      </div>
    </div>

    <!-- Día de inicio -->
    <div class="filter-group">
      <label for="startDaySelect">Día de inicio:</label>
      <div class="custom-dropdown">
        <button class="dropdown-button" (click)="toggleDropdown('startDay')">
          <span>{{ selectedStartDay || 'Seleccionar Día' }}</span>
          <i class="dropdown-arrow" [class.expanded]="isDropdownOpen('startDay')">▼</i>
        </button>
        <ul class="dropdown-menu" [class.expanded]="isDropdownOpen('startDay')">
          <li class="dropdown-item" *ngFor="let day of availableDays">
            <button class="dropdown-option"
                    [class.active]="selectedStartDay === day"
                    (click)="selectStartDay(day)">
              {{ day }}
            </button>
          </li>
        </ul>
      </div>
    </div>

    <!-- Día final -->
    <div class="filter-group">
      <label for="endDaySelect">Día final:</label>
      <div class="custom-dropdown">
        <button class="dropdown-button" (click)="toggleDropdown('endDay')">
          <span>{{ selectedEndDay || 'Seleccionar Día' }}</span>
          <i class="dropdown-arrow" [class.expanded]="isDropdownOpen('endDay')">▼</i>
        </button>
        <ul class="dropdown-menu" [class.expanded]="isDropdownOpen('endDay')">
          <li class="dropdown-item" *ngFor="let day of availableDays">
            <button class="dropdown-option"
                    [class.active]="selectedEndDay === day"
                    (click)="selectEndDay(day)">
              {{ day }}
            </button>
          </li>
        </ul>
      </div>
    </div>

    <!-- Ruta -->
    <div class="filter-group">
      <label for="routeSelect">Ruta:</label>
      <div class="custom-dropdown">
        <button class="dropdown-button" (click)="toggleDropdown('route')">
          <span>{{ getSelectedRouteName() }}</span>
          <i class="dropdown-arrow" [class.expanded]="isDropdownOpen('route')">▼</i>
        </button>
        <ul class="dropdown-menu" [class.expanded]="isDropdownOpen('route')">
          <li class="dropdown-item" *ngFor="let route of availableRoutes">
            <button class="dropdown-option"
                    [class.active]="selectedRoute === route.id"
                    (click)="selectRoute(route.id)">
              {{ route.nombre }}
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="filter-actions">
      <button class="apply-filters-button" (click)="applyFilters()">Aplicar Filtros</button>
    </div>
  </div>
</div>
