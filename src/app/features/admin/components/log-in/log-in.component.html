<div class="login-container">
  <div class="login-card">
    <img src="Logo_TuxRuta.png" alt="Logo" class="logo" />

    <div class="form-group">
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Correo"
        class="input"
      />
    </div>

    <div class="form-group">
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Contraseña"
        class="input"
      />
    </div>

    <button class="login-button" (click)="login()">
      Iniciar sesión   →
    </button>
  </div>
</div>
