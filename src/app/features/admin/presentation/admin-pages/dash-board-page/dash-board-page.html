<div class="dashboard-top-bar">
  <span class="title">Dashboard</span>
  <span class="welcome">Bienvenido</span>
</div>
<div class="separator"></div>

<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="header-content">
      <span>Métricas</span>
      <span class="arrow">➤</span>
    </div>
    <div class="time-display">{{ currentTime }}</div>
  </div>

  <div class="cards-grid">
    <div class="card" *ngFor="let metric of metrics">
      <span class="card-title">{{ metric.title }}</span>
      <span class="card-value">{{ metric.value }}</span>
      <span class="card-subtitle">{{ metric.subtitle }}</span>
    </div>
  </div>

  <div class="quick-actions-section">
    <h3 class="section-title">Accesos Rápidos</h3>
    <div class="actions-grid">
      <a class="action-card" *ngFor="let action of quickActions" [routerLink]="action.route">
        <div class="action-content">
          <span class="action-title">{{ action.title }}</span>
          <span class="action-description">{{ action.description }}</span>
        </div>
        <div class="action-arrow">→</div>
      </a>
    </div>
  </div>
</div>
